<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mon EFB VFR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">✈️ EFB Simulator</div>
        <div class="search-bar">
            <input type="text" id="airport-search" placeholder="Code OACI (ex: LFPG)..." autocomplete="off">
            <button id="search-btn">Chercher</button>
        </div>
        <div class="airport-info" id="airport-title">Aucun aéroport sélectionné</div>
    </header>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>📌 Cartes Épinglées</h3>
                <ul id="pinned-list" class="chart-list">
                    </ul>
            </div>

            <div class="sidebar-section">
                <h3>📂 Catégories</h3>
                <div id="categories-container">
                    <p style="padding: 10px; color: #888;">Cherchez un aéroport pour voir les cartes.</p>
                </div>
            </div>
        </aside>

        <main class="viewer">
            <iframe id="pdf-viewer" src="" frameborder="0"></iframe>
            <div id="viewer-placeholder">Sélectionnez une carte pour l'afficher</div>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
