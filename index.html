<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mon EFB VFR & IFR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <div class="logo">✈️ EFB Simulator</div>
        <div class="search-container">
            <input type="text" id="airport-search" placeholder="Code OACI (ex: LFPG)..." autocomplete="off">
            <button id="search-btn">🔍</button>
        </div>
        <div class="current-icao" id="airport-title">En attente...</div>
    </header>

    <div class="app-container">
        
        <aside class="sidebar-left">
            <div class="sidebar-header">
                <h2>Charts</h2>
            </div>
            
            <div id="tabs-container" class="tabs-container">
                </div>

            <div id="categories-container" class="chart-list-wrapper">
                <p class="empty-msg">Recherchez un aéroport pour afficher les cartes.</p>
            </div>
        </aside>

        <main class="viewer">
            <iframe id="pdf-viewer" src="" frameborder="0"></iframe>
            <div id="viewer-placeholder">Sélectionnez une carte pour l'afficher</div>
        </main>

        <aside class="sidebar-right">
            <div class="sidebar-header">
                <h2>Dock</h2>
            </div>
            <div id="dock-container" class="dock-list-wrapper">
                </div>
        </aside>

    </div>

    <script src="app.js"></script>
</body>
</html>
